name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate unique frontend build id
        id: build_id
        shell: bash
        run: |
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          BUILD_ID="pages-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
          echo "BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "Using BUILD_ID=${BUILD_ID}"

      - name: Stamp build id into static files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          build_id = os.environ["BUILD_ID"]
          placeholder = "__TLC_FRONTEND_BUILD_ID__"

          index_path = Path("index.html")
          text = index_path.read_text(encoding="utf-8")

          if placeholder not in text:
              raise SystemExit("index.html is missing __TLC_FRONTEND_BUILD_ID__ placeholder")

          text = text.replace(placeholder, build_id)
          index_path.write_text(text, encoding="utf-8")

          Path("build-meta.json").write_text(
              json.dumps({"build_id": build_id}, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
